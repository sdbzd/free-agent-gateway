name: Linux Build

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:
  release:
    types:
      - created

jobs:
  build-linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --locked

      - name: Build package
        run: ./scripts/build-linux.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: free-agent-gateway-linux-x86_64
          path: dist/free-agent-gateway-linux-x86_64.tar.gz
          if-no-files-found: error
